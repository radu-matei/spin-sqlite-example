spin_manifest_version = 2

[application]
name = "sqlite"
version = "0.1.0"
authors = ["Radu Matei <radu@fermyon.com>"]

[[trigger.http]]
route = "/..."
component = "api"

[component.api]
source = "api/target/wasm32-wasip1/release/api.wasm"
files = ["chinook.db"]
allowed_outbound_hosts = []
[component.api.build]
command = "cargo build --target wasm32-wasip1 --release"
workdir = "api"
watch = ["src/**/*.rs", "Cargo.toml"]
