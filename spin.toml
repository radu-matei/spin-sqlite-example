spin_manifest_version = 2

[application]
name = "sqlite"
version = "0.1.0"
authors = ["Radu Matei <radu@fermyon.com>"]

[[trigger.http]]
route = "/api/..."
component = "api"

[component.api]
source = "api/target/wasm32-wasip1/release/api.wasm"
allowed_outbound_hosts = []
[component.api.build]
command = "bash build.sh sakila.db"
watch = ["api/src/**/*.rs", "api/Cargo.toml"]

[[trigger.http]]
route = "/..."
component = "ui"

[component.ui]
source = { url = "https://github.com/spinframework/spin-fileserver/releases/download/v0.3.0/spin_static_fs.wasm", digest = "sha256:ef88708817e107bf49985c7cefe4dd1f199bf26f6727819183d5c996baa3d148" }
files = [{ source = "ui", destination = "/" }]
